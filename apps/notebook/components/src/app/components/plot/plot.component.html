<div fxLayout="column">
  <!-- toolbar row -->
  @if (plots.nFrames > 0) {
  <idl-nb-animation-controls
    [ngStyle]="{
      width: (PlotCanvas.offsetWidth || 500) + 'px'
    }"
    [nFrames]="plots.nFrames"
    [interval]="interval"
    (frameChange)="setFrame($event)"
  ></idl-nb-animation-controls>
  }

  <!-- wrap in div so styles dont get goofed up by flex -->
  <div>
    <canvas #PlotCanvas></canvas>
  </div>
  @if (!hasData) {
  <p>No data to plot!</p>
  }
</div>
