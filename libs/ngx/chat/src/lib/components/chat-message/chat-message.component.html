<div
  class="message-wrapper"
  [class.user-message]="message().role === 'user'"
  [class.system-message]="message().role === 'system'"
>
  <mat-card class="message-card">
    <mat-card-content>
      @for (content of message().content; track $index) {
        @if (content.type === 'text') {
          <markdown [data]="content.payload" class="custom-markdown"></markdown>
        } @else if (content.type === 'result') {
          <div>
            <pre>{{ content.payload }}</pre>
          </div>
        }
      }
    </mat-card-content>
  </mat-card>
</div>
